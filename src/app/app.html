<header
    class="sticky top-0 z-10 flex justify-center py-4 transition-all {{ isScrolled ? 'backdrop-blur-xs bg-linear-to-b from-beige-light to-transparent' : '' }}">
    <a routerLink="/" class="flex items-center gap-2">
        <h1>Super</h1>
        <img src="images/logo.svg" alt="Logo Super Choco"
             class="transition-height {{ isScrolled ? 'h-12' : 'h-full' }}">
        <h1>Choco</h1>
    </a>
</header>

<main class="px-6 pt-6 pb-28">
    <router-outlet/>
</main>

@if ((authState.isAuthenticated$() && !authState.loading$())) {
    <nav
        class="fixed bottom-5 left-0 right-0 mx-auto w-fit flex items-center gap-2 bg-blue-light border border-blue/50 p-2 rounded-full shadow-xl shadow-brown/25">
        @for (item of navItems; track item.icon) {
            <button
                app-button
                variant="menu"
                shape="round"
                [routerLink]="item.route"
                routerLinkActive="bg-linear-to-br from-brown to-brown-light text-white"
                [routerLinkActiveOptions]="{ exact: item.route === '' }"
            >
                @switch (item.icon) {
                    @case ('lucideHouse') {
                        <svg lucideHouse [size]="24"></svg>
                    }
                    @case ('lucideCoffee') {
                        <svg lucideCoffee [size]="24"></svg>
                    }
                    @case ('lucideUser') {
                        <svg lucideUser [size]="24"></svg>
                    }
                }
            </button>
        }
        <button
            app-button
            variant="secondary"
            shape="round"
            routerLink="/ajouter-degustation"
            routerLinkActive="bg-brown!"
            [routerLinkActiveOptions]="{ exact: true }"
        >
            <svg lucidePlus [size]="24"></svg>
        </button>
    </nav>
}
