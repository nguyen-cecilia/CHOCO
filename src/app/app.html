<header
    class="sticky top-0 z-10 flex justify-center py-4 transition-all {{ isScrolled ? 'backdrop-blur-xs bg-beige-light/75' : '' }}">
    <a href="/" class="flex items-center gap-2">
        <h1>Super</h1>
        <img src="images/logo.svg" alt="Logo Super Choco"
             class="transition-height {{ isScrolled ? 'h-12' : 'h-full' }}">
        <h1>Choco</h1>
    </a>
</header>

<main class="px-6 pt-6 pb-28">
    <router-outlet/>
</main>

@if ((authState.isAuthenticated$() && !authState.loading$())) {
    <nav class="fixed bottom-5 left-0 right-0 mx-auto w-fit flex items-center gap-2 bg-blue-light p-1 rounded-full">
        @for (item of navItems; track item.label) {
            <button
                app-button
                variant="menu"
                [routerLink]="item.route"
                routerLinkActive="bg-brown text-white"
                [routerLinkActiveOptions]="{ exact: item.route === '' }"
            >
                {{ item.label }}
            </button>
        }
        <button
            app-button
            variant="secondary"
            shape="round"
            routerLink="/ajouter-degustation"
            routerLinkActive="bg-brown!"
            [routerLinkActiveOptions]="{ exact: true }"
        >
            <svg lucidePlus [size]="20"></svg>
        </button>
    </nav>
}
